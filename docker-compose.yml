services:
  claude:
    build:
      context: .
    image: claude-overnight:latest
    container_name: claude-overnight
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - EXTRA_ALLOWED_DOMAINS=${EXTRA_ALLOWED_DOMAINS:-}
    volumes:
      - ~/.claude:/home/node/.claude
      - ~/.claude.json:/home/node/.claude.json
      - ${TASK_FILE}:/TASK.md
      - ${REPO_PATH}:/target
    restart: "no"
