services:
  claude:
    build:
      context: .
    image: claude-overnight:latest
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - EXTRA_ALLOWED_DOMAINS=${EXTRA_ALLOWED_DOMAINS:-}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ~/.claude:/tmp/claude-config:ro
      - ~/.claude.json:/tmp/claude.json:ro
      - ${TASK_FILE}:/TASK.md:ro
      - ${REPO_PATH}:/target
    restart: "no"
